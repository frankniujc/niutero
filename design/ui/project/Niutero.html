<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Niutero</title>
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
  #root { width: 100%; height: 100vh; }
  .niu-globaltoggle {
    position: fixed; top: 14px; right: 16px; z-index: 9999;
    display: flex; align-items: center; gap: 2px; padding: 4px;
    background: #fff; border: 1px solid rgba(0,0,0,.1); border-radius: 11px;
    box-shadow: 0 4px 16px rgba(0,0,0,.1); font-family: 'Hanken Grotesk', system-ui, sans-serif;
  }
  .niu-globaltoggle button {
    border: none; background: transparent; cursor: pointer; height: 30px; padding: 0 12px;
    border-radius: 8px; font: 600 12.5px 'Hanken Grotesk', system-ui, sans-serif; color: #6b6f69;
    display: flex; align-items: center; gap: 6px; transition: background .12s, color .12s;
  }
  .niu-globaltoggle button.on { background: #1F8A5B; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="app/data.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="app/shared.jsx"></script>
<script type="text/babel" src="app/DirectionA.jsx"></script>
<script type="text/babel" src="app/DirectionB.jsx"></script>
<script type="text/babel" src="app/DirectionC.jsx"></script>
<script type="text/babel" src="app/NormalizeTab.jsx"></script>
<script type="text/babel" src="app/AITab.jsx"></script>
<script type="text/babel" src="app/SettingsTab.jsx"></script>
<script type="text/babel" src="app/Overlays.jsx"></script>

<script type="text/babel" data-presets="react">
  // FullApp — the live application shell. Owns:
  //   tab     : active tool (library | normalize | ai | settings) — set by the rail.
  //   libView : library layout (a Classic | b Reader | c Board) — set by the titlebar switcher.
  //   task    : background task state driving the TaskToast progress.
  // startTask(cfg) animates a fake progress task (used by Normalize > Online enrich).
  function FullApp({ theme, setTheme }) {
    const [tab, setTab] = React.useState('library');
    const [libView, setLibView] = React.useState('a');
    const [task, setTask] = React.useState(null);
    const taskRef = React.useRef(null);
    const tp = { theme, setTheme };
    const Ic = window.Icon;

    const startTask = React.useCallback((cfg) => {
      if (taskRef.current) clearInterval(taskRef.current);
      let p = 0;
      const total = cfg.total || 62;
      setTask({ ...cfg, progress: 0, count: '0 / ' + total + ' entries', onReview: () => { setTab('normalize'); } });
      taskRef.current = setInterval(() => {
        p = Math.min(1, p + 0.045 + Math.random() * 0.03);
        const n = Math.round(p * total);
        setTask((t) => t ? { ...t, progress: p, count: n + ' / ' + total + ' entries' } : t);
        if (p >= 1) { clearInterval(taskRef.current); taskRef.current = null; }
      }, 280);
    }, []);
    React.useEffect(() => () => taskRef.current && clearInterval(taskRef.current), []);

    const libBody = libView === 'b' ? React.createElement(window.LibraryViewB, tp)
      : libView === 'c' ? React.createElement(window.LibraryViewC, tp)
      : React.createElement(window.LibraryViewA, tp);
    const body = tab === 'normalize' ? React.createElement(window.NormalizeTab, { startTask })
      : tab === 'ai' ? React.createElement(window.AITab)
      : tab === 'settings' ? React.createElement(window.SettingsTab, tp)
      : libBody;

    const switcher = tab === 'library' ? React.createElement(window.Segmented, {
      size: 'sm', value: libView, onChange: setLibView,
      options: [
        { v: 'a', label: 'Classic', icon: Ic.rows },
        { v: 'b', label: 'Reader', icon: Ic.book },
        { v: 'c', label: 'Board', icon: Ic.grid },
      ],
    }) : null;

    return React.createElement(window.WindowChrome, { theme, setTheme, libName: 'BibVault', active: tab, onNav: setTab, entries: 1292, center: switcher },
      body,
      React.createElement(window.TaskToast, { task, onDismiss: () => setTask(null) }),
      React.createElement(window.AIPopup, { onOpenTab: () => setTab('ai') }),
    );
  }

  function NiuApp() {
    const [theme, setTheme] = React.useState(() => localStorage.getItem('niu-theme') || 'light');
    React.useEffect(() => { localStorage.setItem('niu-theme', theme); }, [theme]);
    const tp = { theme, setTheme };
    const Ic = window.Icon;

    return React.createElement(React.Fragment, null,
      React.createElement('div', { className: 'niu-globaltoggle' },
        React.createElement('button', { className: theme === 'light' ? 'on' : '', onClick: () => setTheme('light') }, Ic.sun({ s: 15 }), 'Light'),
        React.createElement('button', { className: theme === 'dark' ? 'on' : '', onClick: () => setTheme('dark') }, Ic.moon({ s: 15 }), 'Dark'),
      ),
      React.createElement(window.DesignCanvas, null,
        React.createElement(window.DCSection, { id: 'app', title: 'Niutero', subtitle: 'Switch tools on the left rail. In Library, use the titlebar switch (Classic · Reader · Board). The sparkle button opens the AI popup; running Online enrich in Normalize shows a background-task popup.' },
          React.createElement(window.DCArtboard, { id: 'full', label: 'Desktop app', width: 1440, height: 880 },
            React.createElement(FullApp, tp)),
        ),
      ),
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(NiuApp));
</script>
</body>
</html>
