<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header><span class="brand">niutero</span></header>
    <div id="conn" class="status muted">Checking…</div>
    <div id="detected" class="detected">Reading this page…</div>
    <label class="lbl" for="tags">Tags (comma-separated)</label>
    <input id="tags" type="text" autocomplete="off" spellcheck="false" placeholder="e.g. nlp, to-read" />
    <button id="save" class="primary" disabled>Save to niutero</button>
    <div id="result" class="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
